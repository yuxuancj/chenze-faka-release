<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡密管理 - 晨泽发卡</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.8.18/dist/css/layui.min.css" rel="stylesheet">
    <style>
        body { background-color: #f2f2f2; }
        .admin-header { background: #393D49; color: white; padding: 0 20px; height: 60px; line-height: 60px; }
        .admin-header h1 { font-size: 20px; margin: 0; }
        .admin-nav { background: #393D49; min-height: calc(100vh - 60px); width: 200px; float: left; }
        .admin-nav a { display: block; padding: 15px 20px; color: #c2c2c2; text-decoration: none; }
        .admin-nav a:hover, .admin-nav a.active { background: #009688; color: white; }
        .admin-content { margin-left: 200px; padding: 20px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>晨泽发卡 - 后台管理</h1>
        <a href="/" style="float: right; color: white; margin-left: 20px;">返回前台</a>
    </div>
    <div class="admin-nav">
        <a href="/admin">概览</a>
        <a href="/admin/products">商品管理</a>
        <a href="/admin/cards" class="active">卡密管理</a>
        <a href="/admin/orders">订单管理</a>
        <a href="/admin/users">用户管理</a>
        <a href="/admin/categories">分类管理</a>
    </div>
    <div class="admin-content">
        <div class="layui-card">
            <div class="layui-card-header">
                导入卡密
                <button class="layui-btn layui-btn-sm" style="float: right;" onclick="openImport()">导入卡密</button>
            </div>
            <div class="layui-card-body">
                <table class="layui-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>商品</th>
                            <th>卡密</th>
                            <th>状态</th>
                            <th>添加时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{range .cards}}
                        <tr>
                            <td>{{.ID}}</td>
                            <td>{{.Product.Name}}</td>
                            <td>{{.Content}}</td>
                            <td>{{if eq .Status 1}}未售{{else}}已售{{end}}</td>
                            <td>{{.CreatedAt}}</td>
                        </tr>
                        {{end}}
                        {{if not .cards}}
                        <tr><td colspan="5" class="text-center">暂无卡密，请先导入</td></tr>
                        {{end}}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="import-modal" style="display:none; padding: 20px;">
        <div class="layui-form-item">
            <label class="layui-form-label">选择商品</label>
            <div class="layui-input-block">
                <select id="product-select" lay-ignore>
                    {{range .products}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">卡密内容</label>
            <div class="layui-input-block">
                <textarea id="cards-content" placeholder="每行一条卡密" class="layui-textarea" rows="10"></textarea>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/layui@2.8.18/dist/layui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        function openImport() {
            layui.layer.open({
                type: 1,
                title: '导入卡密',
                content: document.getElementById('import-modal'),
                area: ['500px', '400px'],
                btn: ['导入', '取消'],
                yes: function(index) {
                    axios.post('/api/cards/import', {
                        product_id: parseInt(document.getElementById('product-select').value),
                        content: document.getElementById('cards-content').value
                    }).then(res => {
                        if (res.data.code === 0) {
                            layer.msg(res.data.msg, {icon: 1});
                            layer.close(index);
                            setTimeout(() => location.reload(), 1000);
                        } else {
                            layer.msg(res.data.msg, {icon: 2});
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
