<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 晨泽发卡</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .register-card { max-width: 400px; margin: 100px auto; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card register-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">用户注册</h3>
                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" name="password" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱（选填）</label>
                        <input type="email" class="form-control" name="email">
                    </div>
                    <button type="button" class="btn btn-primary w-100" onclick="register()">注册</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login">已有账号？去登录</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        function register() {
            const form = document.getElementById('register-form');
            axios.post('/api/register', {
                username: form.username.value,
                password: form.password.value,
                email: form.email.value
            }).then(res => {
                if (res.data.code === 0) {
                    alert('注册成功，请登录');
                    window.location.href = '/login';
                } else {
                    alert(res.data.msg);
                }
            }).catch(err => {
                alert(err.response?.data?.msg || '注册失败');
            });
        }
    </script>
</body>
</html>
